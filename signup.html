<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
body {
    margin: 0;
    padding: 0;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(110deg, #1A214B 0%, #dfe1ea 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}
.auth-card {
    width: 420px;
    background: white;
    margin-top: 8rem;
    padding: 40px;
    border-radius: 22px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    text-align: center;
}
.auth-card h2 { 
    font-size: 24px; 
    margin-bottom: 10px; 
}
.auth-card p.sub-topic {
    font-size: 14px;
    color: #555;
    margin-bottom: 25px;
}
.input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    justify-content: center;
}
.input-row input {
    width: 40%;
    padding: 12px 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
    outline: none;
    background: #fafafa;
}
.input-row input:focus {
    border-color: #1b234b;
    box-shadow: 0 0 5px rgba(27,35,75,0.3);
}
.input-box { 
    width: 100%; 
    margin-bottom: 18px; 
    display: flex;
    justify-content: center;
}
.input-box input {
    width: 80%;
    padding: 12px 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
    outline: none;
    background: #fafafa;
}
.input-box input:focus {
    border-color: #1b234b;
    box-shadow: 0 0 5px rgba(27,35,75,0.3);
}
.auth-btn {
    width: 100%;
    padding: 12px;
    background: #5d6fd2;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    color: white;
    cursor: pointer;
    margin-top: 5px;
}
.auth-btn:hover { background: #4b5ecc; }
.auth-text { margin-top: 12px; font-size: 13px; }
.auth-text a { color: #4b8acb; text-decoration: none; font-weight: 600; }
.auth-text a:hover { text-decoration: underline; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-card">
        <h2>SIGN UP</h2>
        <p class="sub-topic">Create a new account to access the system</p>

        <div class="input-row">
            <input type="text" id="firstName" placeholder="First Name">
            <input type="text" id="lastName" placeholder="Last Name">
        </div>
        <div class="input-box">
            <input type="text" id="studentId" placeholder="Enter your 6-digit Student ID" maxlength="6">
        </div>
        <div class="input-box">
            <input type="email" id="email" placeholder="Enter your email address">
        </div>
        <div class="input-box">
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        <div class="input-box">
            <input type="password" id="confirmPassword" placeholder="Confirm your password">
        </div>

        <button class="auth-btn" onclick="signupForm()">SIGN UP</button>

        <div class="auth-text">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        function signupForm() {
            const firstName = document.getElementById("firstName").value;
            const lastName = document.getElementById("lastName").value;
            const studentId = document.getElementById("studentId").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if(!firstName || !lastName || !studentId || !email || !password || !confirmPassword) {
                alert("Please complete all fields.");
                return;
            }

            if(studentId.length !== 6) {
                alert("Student ID must be exactly 6 digits.");
                return;
            }

            if(password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            if(password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            // Save user data to localStorage
            const userData = {
                firstName: firstName,
                lastName: lastName,
                studentId: studentId,
                email: email,
                password: password
            };
            localStorage.setItem("user", JSON.stringify(userData));

            alert("Account created successfully! Redirecting to login...");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
