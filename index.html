<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(110deg, #1A214B 0%, #dfe1ea 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}
.card {
    width: 420px;
    background: white;
    margin-top: 8rem;
    padding: 40px;
    border-radius: 22px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    text-align: center;
}
.card h2 { 
    font-size: 24px; 
    margin-bottom: 10px; 
}
.card p.sub-topic {
    font-size: 14px;
    color: #555;
    margin-bottom: 25px;
}
.input-box { 
    width: 100%; 
    margin-bottom: 18px; 
    display: flex;
    justify-content: center;
}
.input-box input {
    width: 80%; /* narrower input fields */
    padding: 12px 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
    outline: none;
    background: #fafafa;
}
.input-box input:focus {
    border-color: #1b234b;
    box-shadow: 0 0 5px rgba(27,35,75,0.3);
}
.btn {
    width: 100%;
    padding: 12px;
    background: #5d6fd2;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    color: white;
    cursor: pointer;
    margin-top: 5px;
}
.btn:hover { background: #4b5ecc; }
.login-text { margin-top: 12px; font-size: 13px; }
.login-text a { color: #4b8acb; text-decoration: none; font-weight: 600; }
.login-text a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
    <h2>SIGN UP</h2>
    <p class="sub-topic">Create your account to access your student dashboard</p>

    <div class="input-box">
        <input type="text" id="fullname" placeholder="Enter your full name">
    </div>
    <div class="input-box">
        <input type="text" id="studentId" placeholder="Enter your 6-digit Student ID" maxlength="6">
    </div>
    <div class="input-box">
        <input type="email" id="email" placeholder="Enter your email">
    </div>
    <div class="input-box">
        <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button class="btn" onclick="submitForm()">SIGN UP</button>

    <div class="login-text">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script>
function submitForm() {
    const fullname = document.getElementById("fullname").value;
    const studentId = document.getElementById("studentId").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!fullname || !studentId || !email || !password){
        alert("Please complete all fields.");
        return;
    }

    // Save user to LocalStorage
    const user = { fullname, studentId, email, password };
    localStorage.setItem("user", JSON.stringify(user));

    alert("Signed up successfully! You can now login.");
    window.location.href = "login.html"; // Redirect to login page
}
</script>

</body>
</html>
