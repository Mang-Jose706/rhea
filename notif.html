<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDEAS Activity Center</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/common.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef2ff;
      --surface: #ffffff;
      --text: #09142d;
      --muted: #64748b;
      --accent: #2563eb;
      --success: #16a34a;
      --danger: #ef4444;
      --orange: #f97316;
      --border: #e2e8f0;
      --radius: 18px;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', 'Inter', 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    body.dark-mode {
      --bg: #081126;
      --surface: #0b1430;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #18263d;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    .container {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      position: sticky;
      top: 16px;
      background: transparent;
      z-index: 2;
    }

    .page-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .page-info h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .page-info p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
      max-width: 680px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 200ms ease, box-shadow 200ms ease, background-color 200ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
    }

    .btn.primary {
      border: none;
      background: var(--accent);
      color: #fff;
    }

    .filter-panel {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(37, 99, 235, 0.08);
      border: 1px solid rgba(37, 99, 235, 0.16);
    }

    .filter-panel label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 0.92rem;
      user-select: none;
    }

    .filter-panel input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .status-row {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.08);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
      transition: background-color 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .status-pill.disconnected {
      background: rgba(254, 226, 226, 0.95);
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .status-pill.connected {
      background: rgba(220, 252, 231, 0.95);
      color: #166534;
      border: 1px solid rgba(22, 101, 52, 0.16);
    }

    .status-pill.connecting {
      background: rgba(219, 234, 254, 0.95);
      color: #1d4ed8;
      border: 1px solid rgba(37, 99, 235, 0.16);
    }

    .status-pill.received {
      background: rgba(255, 247, 237, 0.95);
      color: #c2410c;
      border: 1px solid rgba(251, 146, 60, 0.16);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 12px;
    }

    .notif-card {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #fff;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      cursor: pointer;
      min-height: 120px;
      position: relative;
    }

    .notif-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.08);
      border-color: rgba(37, 99, 235, 0.16);
    }

    .notif-card.read {
      opacity: 0.72;
      background: rgba(249, 250, 251, 0.88);
    }

    .icon-wrap {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #fff;
      flex-shrink: 0;
      font-size: 1.1rem;
    }

    .icon-wrap.green { background: #16a34a; }
    .icon-wrap.blue { background: #2563eb; }
    .icon-wrap.red { background: #ef4444; }
    .icon-wrap.orange { background: #f97316; }
    .icon-wrap.gray { background: #64748b; }

    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .body h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .body .desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      max-height: 3em;
      overflow: hidden;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .body .details {
      display: none;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.6;
    }

    .notif-card.expanded .details {
      display: block;
    }

    .notif-card.expanded .desc {
      max-height: none;
      line-clamp: unset;
      -webkit-line-clamp: unset;
    }

    .view-more {
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 600;
      margin-top: 4px;
      opacity: 0.92;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .timestamp {
      font-size: 0.84rem;
      color: var(--muted);
    }

    .category {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.05);
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 700;
    }

    .return-center {
      display: flex;
      justify-content: center;
      margin-top: 26px;
    }

    .return-dashboard {
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    @media (max-width: 840px) {
      .grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: stretch; }
      .actions { justify-content: flex-start; width: 100%; }
      .filter-panel { width: 100%; justify-content: flex-start; }
    }

    @media (max-width: 560px) {
      body { padding: 16px; }
      .container { padding: 18px; }
      .btn { width: 100%; justify-content: center; }
      .actions { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="page-info">
        <h1>IDEAS Activity Center</h1>
        <p>Live ID processing updates arrive instantly here, grouped by System Alerts, Request Updates, and Account Actions.</p>
      </div>

      <div class="actions">
        <button class="btn icon" id="settingsBtn"><i class="fa-solid fa-gear"></i> Settings</button>
        <button class="btn primary" id="markAllBtn"><i class="fa-solid fa-check"></i> Mark All Read</button>
      </div>
    </div>

    <div class="status-row">
      <span class="status-pill" id="connectionStatus"><i class="fa-solid fa-circle-notch fa-spin"></i> Connecting to live feed...</span>
      <span class="status-pill" id="eventCounter">0 messages received</span>
    </div>

    <div class="filter-panel" id="filterPanel">
      <label><input type="checkbox" data-type="System Alerts" checked> System Alerts</label>
      <label><input type="checkbox" data-type="Request Updates" checked> Request Updates</label>
      <label><input type="checkbox" data-type="Account Actions" checked> Account Actions</label>
    </div>

    <div class="grid" id="notifGrid"></div>

    <div class="return-center">
      <a class="return-dashboard" href="student-dashboard.html"><i class="fa-solid fa-house"></i> Return to Dashboard</a>
    </div>
  </div>

  <script>
    const notifGrid = document.getElementById('notifGrid');
    const connectionStatus = document.getElementById('connectionStatus');
    const eventCounter = document.getElementById('eventCounter');
    const filterPanel = document.getElementById('filterPanel');
    const settingsBtn = document.getElementById('settingsBtn');
    const markAllBtn = document.getElementById('markAllBtn');

    const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
    const BACKEND_BASE_URL = 'http://localhost:3000';
    const eventCounts = { total: 0 };
    const filters = {
      'System Alerts': true,
      'Request Updates': true,
      'Account Actions': true,
    };

    const eventTypeMap = {
      'request.new': { tone: 'orange', icon: 'fa-file-circle-plus', category: 'Request Updates' },
      'request.review': { tone: 'blue', icon: 'fa-spinner', category: 'Request Updates' },
      'request.approved': { tone: 'green', icon: 'fa-circle-check', category: 'Request Updates' },
      'request.rejected': { tone: 'red', icon: 'fa-circle-xmark', category: 'Request Updates' },
      'account.security': { tone: 'red', icon: 'fa-shield-exclamation', category: 'Account Actions' },
      'system.maintenance': { tone: 'blue', icon: 'fa-server', category: 'System Alerts' },
      'system.update': { tone: 'blue', icon: 'fa-arrow-trend-up', category: 'System Alerts' },
      'account.updated': { tone: 'green', icon: 'fa-user-check', category: 'Account Actions' }
    };

    function updateStatus(state) {
      const states = {
        connecting: { label: 'Connecting to live feed...', icon: 'fa-circle-notch fa-spin', style: 'connecting' },
        connected: { label: 'Live feed active', icon: 'fa-signal', style: 'connected' },
        disconnected: { label: 'Disconnected — retrying...', icon: 'fa-wifi-slash', style: 'disconnected' },
        unsupported: { label: 'Live updates unavailable', icon: 'fa-triangle-exclamation', style: 'disconnected' },
        received: { label: 'Received a notification', icon: 'fa-bell', style: 'received' }
      };
      const stateInfo = states[state] || states.connecting;
      connectionStatus.innerHTML = `<i class="fa-solid ${stateInfo.icon}"></i> ${stateInfo.label}`;
      connectionStatus.classList.remove('connecting', 'connected', 'disconnected', 'received');
      connectionStatus.classList.add(stateInfo.style);
    }

    function showReceivedStatus() {
      updateStatus('received');
      clearTimeout(showReceivedStatus.timeoutId);
      showReceivedStatus.timeoutId = setTimeout(() => {
        updateStatus('connected');
      }, 3000);
    }

    function updateCounter() {
      eventCounter.textContent = `${eventCounts.total} messages received`;
    }

    async function fetchNotifications() {
      const userId = currentUser.userId || currentUser.studentId;
      const endpoint = new URL(`${BACKEND_BASE_URL}/notifications`);
      if (userId) endpoint.searchParams.set('userId', userId);

      try {
        const response = await fetch(endpoint.href);
        if (!response.ok) {
          throw new Error(`Unable to load notifications: ${response.status}`);
        }

        const notifications = await response.json();
        if (Array.isArray(notifications)) {
          notifications.slice().reverse().forEach(addNotification);
        }
      } catch (error) {
        console.warn('Failed to fetch notification history', error);
      }
    }

    function createNotificationCard(notification) {
      const card = document.createElement('article');
      card.className = 'notif-card';
      card.tabIndex = 0;
      card.dataset.category = notification.category;
      card.dataset.type = notification.type;

      const tone = notification.tone || eventTypeMap[notification.type]?.tone || 'gray';
      const iconClass = notification.icon || eventTypeMap[notification.type]?.icon || 'fa-bell';
      const category = notification.category || eventTypeMap[notification.type]?.category || 'System Alerts';

      card.innerHTML = `
        <div class="icon-wrap ${tone}"><i class="fa-solid ${iconClass}"></i></div>
        <div class="body">
          <h3>${notification.title}</h3>
          <p class="desc">${notification.message}</p>
          ${notification.details ? `<p class="details">${notification.details}</p>` : ''}
          <div class="meta">
            <span class="timestamp">${formatDate(notification.timestamp)}</span>
            <span class="category">${category}</span>
          </div>
          ${notification.details ? '<span class="view-more">View details</span>' : ''}
        </div>
      `;

      card.addEventListener('click', () => card.classList.toggle('expanded'));
      card.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          card.classList.toggle('expanded');
        }
      });

      return card;
    }

    function formatDate(timestamp) {
      try {
        return new Date(timestamp).toLocaleString(undefined, {
          month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
        });
      } catch (err) {
        return timestamp || 'Just now';
      }
    }

    function addNotification(event) {
      eventCounts.total += 1;
      updateCounter();

      const notification = {
        ...event,
        category: event.category || eventTypeMap[event.type]?.category || 'System Alerts',
        tone: event.tone || eventTypeMap[event.type]?.tone || 'gray',
        icon: event.icon || eventTypeMap[event.type]?.icon || 'fa-bell',
        details: event.details || ''
      };

      const card = createNotificationCard(notification);
      if (!filters[notification.category]) {
        card.style.display = 'none';
      }
      notifGrid.prepend(card);
    }

    function setFilter(type, checked) {
      filters[type] = checked;
      notifGrid.querySelectorAll('.notif-card').forEach(card => {
        card.style.display = filters[card.dataset.category] ? '' : 'none';
      });
    }

    settingsBtn.addEventListener('click', () => {
      filterPanel.style.display = filterPanel.style.display === 'flex' ? 'none' : 'flex';
    });

    filterPanel.querySelectorAll('input[type="checkbox"]').forEach(input => {
      input.addEventListener('change', () => setFilter(input.dataset.type, input.checked));
    });

    markAllBtn.addEventListener('click', async () => {
      notifGrid.querySelectorAll('.notif-card').forEach(card => card.classList.add('read'));
      markAllBtn.textContent = 'All Read';

      const userId = currentUser.userId || currentUser.studentId;
      if (!userId) return;

      try {
        await fetch(`${BACKEND_BASE_URL}/notifications/mark-all-read`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId })
        });
      } catch (error) {
        console.warn('Failed to mark notifications read on backend', error);
      }
    });

    function connectWebSocket() {
      if (!window.WebSocket) {
        updateStatus('unsupported');
        return;
      }

      const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const host = window.location.hostname || 'localhost';
      const socket = new WebSocket(`${scheme}://${host}:3000/ws`);

      socket.addEventListener('open', () => updateStatus('connected'));
      socket.addEventListener('close', () => {
        updateStatus('disconnected');
        setTimeout(connectWebSocket, 3000);
      });
      socket.addEventListener('error', () => updateStatus('disconnected'));

      socket.addEventListener('message', (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (payload && payload.type) {
            addNotification(payload);
            showReceivedStatus();
          }
        } catch (error) {
          console.warn('Invalid live event payload', error);
        }
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      updateStatus('connecting');
      updateCounter();
      fetchNotifications();
      connectWebSocket();

      const welcomeEvent = {
        type: 'system.welcome',
        category: 'System Alerts',
        title: 'Welcome to the live activity center',
        message: 'This feed updates automatically whenever IDEAS events occur during ID processing.',
        tone: 'blue',
        timestamp: new Date().toISOString(),
        details: 'Notifications include new submissions, review progress, approvals, rejections, and account alerts.'
      };
      addNotification(welcomeEvent);
    });
  </script>
</body>
</html>
