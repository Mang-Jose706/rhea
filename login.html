<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(110deg, #1A214B 0%, #dfe1ea 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}
.card {
    width: 420px;
    background: white;
    margin-top: 12rem;
    padding: 40px;
    border-radius: 22px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    text-align: center;
}
.card h2 { 
    font-size: 24px; 
    margin-bottom: 10px; 
}
.card p.sub-topic {
    font-size: 14px;
    color: #555;
    margin-bottom: 25px;
}
.input-box { 
    width: 100%; 
    margin-bottom: 18px; 
    display: flex;
    justify-content: center;
}
.input-box input {
    width: 80%; /* narrower input fields */
    padding: 12px 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
    outline: none;
    background: #fafafa;
}
.input-box input:focus {
    border-color: #1b234b;
    box-shadow: 0 0 5px rgba(27,35,75,0.3);
}
.btn {
    width: 100%;
    padding: 12px;
    background: #5d6fd2;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    color: white;
    cursor: pointer;
    margin-top: 5px;
}
.btn:hover { background: #4b5ecc; }
.login-text { margin-top: 12px; font-size: 13px; }
.login-text a { color: #4b8acb; text-decoration: none; font-weight: 600; }
.login-text a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
    <h2>LOGIN</h2>
    <p class="sub-topic">Access your account using your Student ID and password</p>

    <div class="input-box">
        <input type="text" id="studentId" placeholder="Enter your 6-digit Student ID" maxlength="6">
    </div>
    <div class="input-box">
        <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button class="btn" onclick="loginForm()">LOGIN</button>

    <div class="login-text">
        Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
</div>

<script>
function loginForm() {
    const studentId = document.getElementById("studentId").value;
    const password = document.getElementById("password").value;

    if(!studentId || !password){
        alert("Please complete all fields.");
        return;
    }

    // Retrieve user from LocalStorage
    const user = JSON.parse(localStorage.getItem("user"));
    if(user && user.studentId === studentId && user.password === password){
        alert("Login successful!");
        window.location.href = "dashboard.html"; // Redirect to dashboard
    } else {
        alert("Invalid Student ID or password.");
    }
}
</script>

</body>
</html>
